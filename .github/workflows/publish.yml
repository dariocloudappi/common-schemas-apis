name: Validate & Publish Common Schemas

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g @redocly/cli@latest
          npm install -g ajv-cli@latest

      - name: Lint all YAML schemas
        run: |
          find components/schemas -name "*.yaml" | while read file; do
            echo "  → Validando: $file"
            redocly lint --skip-rule=no-unused-components "$file" || true
          done

      - name: Validate YAML syntax
        run: |
          find components -name "*.yaml" | while read file; do
            python3 -c "
          import yaml, sys
          try:
              yaml.safe_load(open('$file'))
          except Exception as e:
              sys.exit(1)
            "
          done

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


  notify-dependents:
    name: Notify Dependent Repos
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger re-validation in api-modelos-ia
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPENDENTS_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/api-modelos-ia/dispatches" \
            -d '{"event_type":"schemas-updated","client_payload":{"source":"common-schemas","ref":"${{ github.sha }}"}}'
        continue-on-error: true
